name: Build, Test & Docker Deploy

permissions:
    contents: read

on:
  push:
    branches:
      - main

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: devops-cicd-health-api
  NODE_VERSION: 20

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage
          if-no-files-found: warn

      - name: Verify Dockerfile Exists
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found!"
            exit 1
          fi
          echo "Dockerfile found."

      - name: Build Docker Image
        run: |
          docker build --pull -t ${{ env.IMAGE_NAME }}:latest .

      - name: Verify Docker Image
        run: docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      - name: Show Docker Image Details
        run: |
          docker images ${{ env.IMAGE_NAME }}

      - name: Run Docker Container
        run: |
          docker run -d --name health-api-test -p 3000:3000 ${{ env.IMAGE_NAME }}:latest

          echo "Running containers:"
          docker ps

      - name: Wait for Application to Start
        run: |
          for i in {1..10}; do
            if curl --fail http://localhost:3000/health; then
              echo "Application is healthy!"
              exit 0
            fi
            echo "Waiting for application..."
            sleep 3
          done
          echo "Application failed to start."
          exit 1

      - name: Stop Test Container
        if: always()
        run: |
          echo "======= Container Logs ======="
          docker logs health-api-test || true

          echo "======= Stopping Container ========"
          docker stop health-api-test || true

          echo "======== Removing Container ========what"
          docker rm health-api-test || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Images
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deployment Summary
        run: |
          echo "======================================="
          echo "🚀 Deployment Completed Successfully"
          echo "======================================="
          echo "Application : DevOps CI/CD Health API"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Commit SHA  : ${{ github.sha }}"
          echo "Actor       : ${{ github.actor }}"
          echo "Runner OS   : $RUNNER_OS"
          echo "Node Version: 20"
          echo "Docker Image:"
          echo "  - latest"
          echo "  - ${{ github.sha }}"
          echo "======================================="

      - name: Workflow Completed
        run: |
          echo ""
          echo "CI/CD Pipeline Finished Successfully!"
          echo "The application has been tested, containerized, verified and published to Docker Hub."
